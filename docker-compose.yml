version: '3.8'

services:
  chroma:
    image: chromadb/chroma:latest
    container_name: aiagent-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - aiagent-network

  mem0:
    image: mem0/mem0:latest
    container_name: aiagent-mem0
    ports:
      - "8001:8000"
    environment:
      - MEM0_VECTOR_STORE=chroma
      - MEM0_VECTOR_STORE_URL=http://chroma:8000
      - MEM0_EMBEDDING_MODEL=openai
      - MEM0_OPENAI_API_KEY=${OPENAI_API_KEY}
      - MEM0_OPENAI_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - MEM0_OPENAI_MODEL=text-embedding-v2
    depends_on:
      - chroma
    networks:
      - aiagent-network

volumes:
  chroma-data:
    driver: local

networks:
  aiagent-network:
    driver: bridge
